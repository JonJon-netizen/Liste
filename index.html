<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einkaufsliste</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Minimalist list container */
    .list-container {
      width: 100%;
      max-width: 480px;
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
    }

    /* Simple Title */
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 4px;
    }

    .status-text {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    /* Section Label */
    .section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 12px;
      border-bottom: 2px solid #334155;
      padding-bottom: 6px;
    }

    /* Shopping List Style */
    .shopping-list {
      margin-bottom: 24px;
    }

    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #334155;
    }

    .list-item:last-child {
      border-bottom: none;
    }

    /* Clean Checkbox */
    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #475569;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #1e293b;
      margin-top: 2px;
    }

    .checkbox:hover {
      border-color: #64748b;
    }

    .checkbox.checked {
      background: #22c55e;
      border-color: #22c55e;
    }

    .checkbox.checked::after {
      content: '';
      width: 4px;
      height: 8px;
      border: 2px solid #ffffff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
      display: block;
    }

    /* Item Details */
    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 16px;
      font-weight: 500;
      color: #f1f5f9;
      transition: all 0.2s ease;
    }

    .item-name.done {
      text-decoration: line-through;
      color: #64748b;
    }

    .item-sub {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
      line-height: 1.4;
    }

    .item-price {
      font-size: 16px;
      font-weight: 600;
      color: #f8fafc;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .item-price.done {
      color: #64748b;
    }

    /* Image Container */
    .image-container {
      width: 100%;
      margin-top: 12px;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .list-image {
      width: 100%;
      max-width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <div class="list-container">
    
    <h1>Einkaufsliste</h1>
    <p class="status-text" id="status">1 Artikel · noch nicht bestellt</p>

    <p class="section-label">Elektronik</p>

    <div class="shopping-list">
      <div class="list-item">
        <div class="checkbox" id="cb" onclick="toggle()"></div>
        <div class="item-info">
          <div class="item-name" id="name">Apple Watch SE 3 GPS</div>
          <div class="item-sub">40 mm · Mitternacht · Sport Loop Maritimblau</div>
        </div>
        <div class="item-price" id="price">269,00 €</div>
      </div>
    </div>

    <div class="image-container">
      <img src="image.jpeg" alt="Bitte Katze" class="list-image">
    </div>

  </div>

  <script>
    function toggle() {
      const cb = document.getElementById('cb');
      const name = document.getElementById('name');
      const price = document.getElementById('price');
      const status = document.getElementById('status');
      
      cb.classList.toggle('checked');
      const done = cb.classList.contains('checked');
      
      name.classList.toggle('done', done);
      price.classList.toggle('done', done);
      status.textContent = done ? '1 Artikel · erledigt ✓' : '1 Artikel · noch nicht bestellt';
    }
  </script>
</body>
</html>
